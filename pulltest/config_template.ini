# Pull Tester Configuration File
# Copy this to config.ini and customize for your setup

[Serial]
# Serial port device path
device = /dev/ttyUSB0

# Baud rate (19200 for most force gauges)
baud_rate = 19200

# Data bits (8)
data_bits = 8

# Parity (none, even, odd)
parity = none

# Stop bits (1 or 2)
stop_bits = 1

[GPIO]
# GPIO pin numbers (BCM numbering)
pin_led = 17
pin_start = 18
pin_stop = 23

# Pulse duration in seconds
pulse_duration = 0.25

[Database]
# Database server address
server = localhost

# Database name
database = production_db

# Username
username = db_user

# Password (use environment variable in production!)
password = db_password

# Driver
driver = ODBC Driver 17 for SQL Server

# Connection timeout (seconds)
timeout = 30

[Application]
# Enable/disable features
enable_database = true
enable_gpio = true
enable_serial = true

# Default date format
date_format = %%Y-%%m-%%d

# Logging level (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

# Auto-refresh interval for data grid (seconds)
refresh_interval = 60

[Testing]
# Simulation mode (true/false)
simulation_mode = false

# Demo data for simulation
demo_wire_size = 0.50
demo_standard = 3.5
demo_barcode = BC123456789
